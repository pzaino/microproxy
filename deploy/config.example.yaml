# MicroProxy typed configuration example
#
# This file is intentionally a single valid config plus explicit scenario blocks.
# Copy one scenario block at a time (single provider / failover / selenium downstream)
# into the active sections below when building environment-specific configs.

schema_version: "1"

# listeners: ingress interfaces that accept downstream client traffic.
listeners:
  - name: edge-http
    type: http
    address: 0.0.0.0:8080
    rate_limit: 500
    auth_type: basic
    username: ${MICROPROXY_LISTENER_USER}
    password: ${MICROPROXY_LISTENER_PASSWORD}
    enabled: true

providers:
  - name: corp-http-primary
    type: http_proxy
    auth:
      type: basic
      username: ${MICROPROXY_HTTP_PROXY_USER}
      password: ${MICROPROXY_HTTP_PROXY_PASSWORD}
    endpoints:
      - url: http://proxy-a.internal:3128
        priority: 100
        weight: 3
      - url: http://proxy-b.internal:3128
        priority: 110
        weight: 1
    capabilities: ["forward_proxy"]
    health:
      enabled: true
      check_path: /healthz
      interval_seconds: 15
      timeout_seconds: 2
      failure_threshold: 3

  - name: corp-http-backup
    type: http_proxy
    auth:
      type: basic
      username: ${MICROPROXY_HTTP_PROXY_USER}
      password: ${MICROPROXY_HTTP_PROXY_PASSWORD}
    endpoints:
      - url: http://proxy-c.internal:3128
        priority: 200
        weight: 1
    capabilities: ["forward_proxy"]
    health:
      enabled: true
      check_path: /healthz
      interval_seconds: 15
      timeout_seconds: 2
      failure_threshold: 3

routing:
  default_provider: corp-http-primary
  rules:
    # Single-provider scenario: everything routes through a single upstream.
    - name: scenario-single-provider
      match:
        tenant_id: tenant-single
      provider: corp-http-primary
      policy_ref: allow-default

    # Multi-provider failover scenario: route selected traffic to backup.
    - name: scenario-failover-for-critical
      match:
        tenant_id: tenant-failover
        host_suffix: .critical.example.com
      provider: corp-http-backup
      policy_ref: allow-default

    # Selenium-friendly downstream: no listener auth, upstream auth only.
    # Use listener profile below by setting auth_type:none and clearing credentials.
    - name: scenario-selenium-friendly
      match:
        tenant_id: tenant-selenium
      provider: corp-http-primary
      policy_ref: allow-default

policies:
  - name: allow-default
    type: base
    action: allow

  # Policy snippet: block known media/video URLs.
  - name: deny-video-url-patterns
    type: content
    action: deny
    selectors:
      url_regex: '(?i).*(\\.mp4|\\.m3u8|\\.webm|\\.mov)(\\?.*)?$'
    parameters:
      reason_code: media_block_url
      reason: blocked by URL media extension policy
      deny_category: content

  # Policy snippet: block media/video by response content-type.
  - name: deny-video-content-type
    type: content
    action: deny
    selectors:
      content_type_regex: '(?i)^(video/.*|application/vnd\\.apple\\.mpegurl|application/x-mpegurl)'
    parameters:
      reason_code: media_block_content_type
      reason: blocked by response Content-Type policy
      deny_category: content

  # Example header patch (correctly uses headers_patch action; not redirect).
  - name: strip-sensitive-request-headers
    type: header
    action: headers_patch
    selectors:
      phase: request
    parameters:
      authorization: ""
      x-api-key: ""
      cookie: ""

policy_engine:
  chain_mode: continue
  safe_mode:
    allow_request_header_mutation: true
    allow_response_header_mutation: false
    allow_redirect_rewrite: false
    allow_body_mutation: false

tenants:
  - name: tenant-single
    id: tenant-single
    providers: [corp-http-primary]
    policies: [allow-default]
  - name: tenant-failover
    id: tenant-failover
    providers: [corp-http-primary, corp-http-backup]
    policies: [allow-default, deny-video-url-patterns, deny-video-content-type]
  - name: tenant-selenium
    id: tenant-selenium
    providers: [corp-http-primary]
    policies: [allow-default]

observability:
  access_log:
    enabled: true
    format: json
  metrics:
    enabled: true
    address: 0.0.0.0:9091
  tracing:
    enabled: false
    exporter: otlp
    endpoint: otel-collector.monitoring.svc.cluster.local:4317
  health_endpoints:
    liveness_address: 0.0.0.0:9090
    readiness_address: 0.0.0.0:9092
    startup_address: 0.0.0.0:9093

# --- Scenario-only snippets (copy into active sections as needed) ---
# single-provider:
#   listeners[0].auth_type: basic
#   routing.default_provider: corp-http-primary
#
# multi-provider-failover:
#   providers: corp-http-primary + corp-http-backup
#   routing.rules: include scenario-failover-for-critical
#
# selenium-friendly-downstream:
#   listeners[0].auth_type: none
#   listeners[0].username/password: removed
#   providers[*].auth: keep upstream auth enabled
