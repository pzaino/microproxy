openapi: 3.1.0
info:
  title: MicroProxy Control Plane API
  version: 0.1.0
  description: Initial contract for MicroProxy control-plane resources.
servers:
  - url: http://localhost:8081
paths:
  /api/v1/health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: Service health status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/config:
    get:
      summary: Read effective config
      operationId: getConfig
      description: Returns a sanitized runtime configuration view. Sensitive values are always redacted, including `providers[].auth.password`, `providers[].auth.token`, and sensitive auth header values (for example `Authorization`, `X-Api-Key`, and other auth/token/secret/password header variants).
      responses:
        '200':
          description: Effective runtime configuration with secrets redacted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigResponse'
  /api/v1/providers:
    get:
      summary: List providers (stub)
      operationId: listProviders
      responses:
        '200':
          description: Stubbed providers resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StubListResponse'
    post:
      summary: Create provider (stub)
      operationId: createProvider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProviderCreateRequest'
      responses:
        '400':
          description: Request validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '501':
          description: Not implemented yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/providers/{providerID}:
    get:
      summary: Get provider (stub)
      operationId: getProvider
      parameters:
        - $ref: '#/components/parameters/providerID'
      responses:
        '501':
          description: Not implemented yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    put:
      summary: Replace provider (stub)
      operationId: replaceProvider
      parameters:
        - $ref: '#/components/parameters/providerID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProviderReplaceRequest'
      responses:
        '400':
          description: Request validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '501':
          description: Not implemented yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    patch:
      summary: Patch provider (stub)
      operationId: patchProvider
      parameters:
        - $ref: '#/components/parameters/providerID'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProviderPatchRequest'
      responses:
        '400':
          description: Request validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '501':
          description: Not implemented yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      summary: Delete provider (stub)
      operationId: deleteProvider
      parameters:
        - $ref: '#/components/parameters/providerID'
      responses:
        '400':
          description: Request validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '501':
          description: Not implemented yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/policies:
    get:
      summary: List policies (stub)
      operationId: listPolicies
      responses:
        '200':
          description: Stubbed policies resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StubListResponse'
  /api/v1/policies/{policyID}:
    get:
      summary: Get policy (stub)
      operationId: getPolicy
      parameters:
        - $ref: '#/components/parameters/policyID'
      responses:
        '501':
          description: Not implemented yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/routing:
    get:
      summary: List routing rules (stub)
      operationId: listRouting
      responses:
        '200':
          description: Stubbed routing resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StubListResponse'
  /api/v1/routing/{routeID}:
    get:
      summary: Get routing rule (stub)
      operationId: getRouting
      parameters:
        - $ref: '#/components/parameters/routeID'
      responses:
        '501':
          description: Not implemented yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/tenants:
    get:
      summary: List tenants (stub)
      operationId: listTenants
      responses:
        '200':
          description: Stubbed tenants resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StubListResponse'
  /api/v1/tenants/{tenantID}:
    get:
      summary: Get tenant (stub)
      operationId: getTenant
      parameters:
        - $ref: '#/components/parameters/tenantID'
      responses:
        '501':
          description: Not implemented yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/sessions:
    get:
      summary: List sessions (stub)
      operationId: listSessions
      responses:
        '200':
          description: Stubbed sessions resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StubListResponse'
  /api/v1/sessions/{sessionID}:
    get:
      summary: Get session (stub)
      operationId: getSession
      parameters:
        - $ref: '#/components/parameters/sessionID'
      responses:
        '501':
          description: Not implemented yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  parameters:
    providerID:
      name: providerID
      in: path
      required: true
      schema:
        type: string
    policyID:
      name: policyID
      in: path
      required: true
      schema:
        type: string
    routeID:
      name: routeID
      in: path
      required: true
      schema:
        type: string
    tenantID:
      name: tenantID
      in: path
      required: true
      schema:
        type: string
    sessionID:
      name: sessionID
      in: path
      required: true
      schema:
        type: string
  schemas:
    HealthResponse:
      type: object
      required: [status, service, timestamp]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: microproxy-control
        timestamp:
          type: string
          format: date-time
    ConfigResponse:
      type: object
      required: [config]
      properties:
        config:
          description: Effective runtime config object.
          type: object
          additionalProperties: true
    StubListResponse:
      type: object
      required: [resource, items]
      properties:
        resource:
          type: string
        items:
          type: array
          items:
            type: object
            additionalProperties: true
    ProviderCreateRequest:
      type: object
      description: Minimal provider create contract accepted by current stub.
      minProperties: 1
      additionalProperties: true
      properties:
        name:
          type: string
          description: Provider display name.
        type:
          type: string
          description: Provider implementation type.
        endpoint:
          type: string
          description: Provider base endpoint URL.
    ProviderReplaceRequest:
      type: object
      description: Minimal provider replace contract accepted by current stub.
      minProperties: 1
      additionalProperties: true
      properties:
        name:
          type: string
          description: Provider display name.
        type:
          type: string
          description: Provider implementation type.
        endpoint:
          type: string
          description: Provider base endpoint URL.
        enabled:
          type: boolean
          description: Whether the provider is enabled.
    ProviderPatchRequest:
      type: object
      description: Minimal provider patch contract accepted by current stub. Empty object is allowed.
      additionalProperties: true
      properties:
        name:
          type: string
          description: Provider display name.
        type:
          type: string
          description: Provider implementation type.
        endpoint:
          type: string
          description: Provider base endpoint URL.
        enabled:
          type: boolean
          description: Whether the provider is enabled.
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorModel'
    ErrorModel:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: not_implemented
        message:
          type: string
        request_id:
          type: string
