openapi: 3.1.0
info:
  title: MicroProxy Control Plane API
  version: 0.1.0
  description: Control-plane contract for MicroProxy resources.
servers:
  - url: http://localhost:8081
paths:
  /api/v1/health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: Service health status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/config:
    get:
      summary: Read effective config
      operationId: getConfig
      description: Returns a sanitized runtime configuration view. Sensitive values are always redacted, including `providers[].auth.password`, `providers[].auth.token`, and sensitive auth header values (for example `Authorization`, `X-Api-Key`, and other auth/token/secret/password header variants).
      responses:
        '200':
          description: Effective runtime configuration with secrets redacted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigResponse'
  /api/v1/providers:
    get:
      summary: List providers
      operationId: listProviders
      responses:
        '200':
          description: Provider collection.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderListResponse'
    post:
      summary: Create provider
      operationId: createProvider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProviderWriteRequest'
      responses:
        '201':
          description: Provider created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderResponse'
        '409':
          description: Provider ID already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          description: Semantic validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/providers/{providerID}:
    get:
      summary: Get provider
      operationId: getProvider
      parameters:
        - $ref: '#/components/parameters/providerID'
      responses:
        '200':
          description: Provider resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderResponse'
        '404':
          description: Provider not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    put:
      summary: Replace provider
      operationId: replaceProvider
      parameters:
        - $ref: '#/components/parameters/providerID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProviderWriteRequest'
      responses:
        '200':
          description: Provider replaced.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderResponse'
        '404':
          description: Provider not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Resource version conflict.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          description: Semantic validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    patch:
      summary: Patch provider
      operationId: patchProvider
      parameters:
        - $ref: '#/components/parameters/providerID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProviderPatchRequest'
      responses:
        '200':
          description: Provider patched.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderResponse'
        '404':
          description: Provider not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Resource version conflict.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          description: Semantic validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      summary: Delete provider
      operationId: deleteProvider
      parameters:
        - $ref: '#/components/parameters/providerID'
        - name: resourceVersion
          in: query
          required: false
          schema:
            type: string
          description: Expected resource version. Can also be supplied in `If-Match` header.
      responses:
        '204':
          description: Provider deleted.
        '404':
          description: Provider not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Resource version conflict.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          description: Semantic validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/providers/{providerID}/rotate:
    post:
      summary: Rotate provider endpoint/session
      operationId: rotateProvider
      responses:
        '202': {description: Accepted}
  /api/v1/providers/{providerID}/sessions/{sid}/refresh:
    post:
      summary: Refresh provider session
      operationId: refreshProviderSession
      responses:
        '202': {description: Accepted}
  /api/v1/providers/{providerID}/capabilities:
    get:
      summary: Get provider capabilities
      operationId: getProviderCapabilities
      responses:
        '200': {description: Provider capabilities}
  /api/v1/operations/{operationID}:
    get:
      summary: Get async operation status
      operationId: getOperationStatus
      responses:
        '200': {description: Operation status}
  /api/v1/policies:
    get:
      summary: List policies (stub)
      operationId: listPolicies
      responses:
        '200':
          description: Stubbed policies resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StubListResponse'
  /api/v1/policies/{policyID}:
    get:
      summary: Get policy (stub)
      operationId: getPolicy
      parameters:
        - $ref: '#/components/parameters/policyID'
      responses:
        '501':
          description: Not implemented yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/policies/dry-run:
    post:
      summary: Dry-run policy evaluation
      operationId: policyDryRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyDryRunRequest'
      responses:
        '200':
          description: Policy dry-run evaluation result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyDryRunResponse'
        '400':
          description: Invalid payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          description: Semantic validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/routing:
    get:
      summary: List routing rules (stub)
      operationId: listRouting
      responses:
        '200':
          description: Stubbed routing resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StubListResponse'
  /api/v1/routing/{routeID}:
    get:
      summary: Get routing rule (stub)
      operationId: getRouting
      parameters:
        - $ref: '#/components/parameters/routeID'
      responses:
        '501':
          description: Not implemented yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/tenants:
    get:
      summary: List tenants (stub)
      operationId: listTenants
      responses:
        '200':
          description: Stubbed tenants resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StubListResponse'
  /api/v1/tenants/{tenantID}:
    get:
      summary: Get tenant (stub)
      operationId: getTenant
      parameters:
        - $ref: '#/components/parameters/tenantID'
      responses:
        '501':
          description: Not implemented yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/sessions:
    get:
      summary: List sessions (stub)
      operationId: listSessions
      responses:
        '200':
          description: Stubbed sessions resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StubListResponse'
  /api/v1/sessions/{sessionID}:
    get:
      summary: Get session (stub)
      operationId: getSession
      parameters:
        - $ref: '#/components/parameters/sessionID'
      responses:
        '501':
          description: Not implemented yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  parameters:
    providerID:
      name: providerID
      in: path
      required: true
      schema:
        type: string
    policyID:
      name: policyID
      in: path
      required: true
      schema:
        type: string
    routeID:
      name: routeID
      in: path
      required: true
      schema:
        type: string
    tenantID:
      name: tenantID
      in: path
      required: true
      schema:
        type: string
    sessionID:
      name: sessionID
      in: path
      required: true
      schema:
        type: string
  schemas:
    HealthResponse:
      type: object
      required: [status, service, timestamp]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: microproxy-control
        timestamp:
          type: string
          format: date-time
    ConfigResponse:
      type: object
      required: [config]
      properties:
        config:
          description: Effective runtime config object.
          type: object
          additionalProperties: true
    StubListResponse:
      type: object
      required: [resource, items]
      properties:
        resource:
          type: string
        items:
          type: array
          items:
            type: object
            additionalProperties: true
    ProviderSpec:
      type: object
      required: [id, name, type, endpoint]
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        endpoint:
          type: string
    Provider:
      type: object
      required: [id, resourceVersion, spec]
      properties:
        id:
          type: string
        resourceVersion:
          type: string
        spec:
          $ref: '#/components/schemas/ProviderSpec'
    ProviderWriteRequest:
      type: object
      required: [provider]
      properties:
        resourceVersion:
          type: string
          description: Required for PUT and ignored for POST.
        provider:
          $ref: '#/components/schemas/ProviderSpec'
    ProviderPatchRequest:
      type: object
      required: [resourceVersion, patch]
      properties:
        resourceVersion:
          type: string
        patch:
          type: object
          minProperties: 1
          additionalProperties: false
          properties:
            name:
              type: string
            type:
              type: string
            endpoint:
              type: string
    ProviderResponse:
      type: object
      required: [provider]
      properties:
        provider:
          $ref: '#/components/schemas/Provider'
    ProviderListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Provider'
    PolicyDryRunRequest:
      type: object
      required: [policyRef]
      properties:
        policyRef:
          type: string
        method:
          type: string
        url:
          type: string
        headers:
          type: object
          additionalProperties:
            type: string
        metadata:
          type: object
          properties:
            tenantID:
              type: string
            provider:
              type: string
            contentType:
              type: string
            requestSize:
              type: integer
              format: int64
            responseSize:
              type: integer
              format: int64
            evaluationTime:
              type: string
              format: date-time
    PolicyDryRunResponse:
      type: object
      properties:
        decision:
          type: object
          additionalProperties: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorModel'
    ErrorModel:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
        request_id:
          type: string
